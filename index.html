<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>랜덤 좌석 배정</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/static/pretendard-dynamic-subset.css');

        :root {
            --primary:    #3182F6;
            --primary-dk: #1C6FE8;
            --primary-lt: #EBF3FF;
            --amber:      #F5A623;
            --amber-lt:   #FFF0CC;
            --red:        #F04452;
            --green:      #12B886;
            --green-lt:   #E6FCF5;
            --gray-50:    #F9FAFB;
            --gray-100:   #F2F4F6;
            --gray-200:   #E5E8EB;
            --gray-300:   #C2C7CF;
            --gray-400:   #9EA6B2;
            --gray-600:   #4E5968;
            --gray-800:   #1F2D3D;
            /* legacy aliases used in JS-generated HTML */
            --blue:       #3182F6;
            --blue-dk:    #1C6FE8;
            --blue-lt:    #EBF3FF;
            --blue-bd:    #BFDBFE;
            --amber-bd:   #F5D58A;
            --red-lt:     #FFE8EA;
            --red-bd:     #FFC9CC;
            --green-bd:   #A3E9D0;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
            background: var(--gray-50);
            -webkit-tap-highlight-color: transparent;
        }

        .app {
            max-width: 430px;
            margin: 0 auto;
            background: #fff;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ─── Header ─── */
        .header {
            background: #fff;
            padding: 18px 20px 14px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-text { text-align: center; flex: 1; }
        .header h1 {
            font-size: 19px;
            font-weight: 700;
            color: var(--gray-800);
            letter-spacing: -0.5px;
        }
        .header p {
            font-size: 12px;
            color: var(--gray-400);
            margin-top: 3px;
            font-weight: 400;
        }
        .btn-save-icon {
            width: 38px; height: 38px;
            border-radius: 12px;
            border: none;
            background: var(--primary-lt);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.12s, transform 0.1s;
        }
        .btn-save-icon:active { transform: scale(0.91); background: #d6e8ff; }
        .header-spacer { width: 38px; flex-shrink: 0; }

        /* ─── Bus area ─── */
        .bus-area {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            background: #fff;
            padding: 10px 0 4px;
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 4px 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 8px;
            flex-shrink: 0;
            padding: 0 20px;
        }
        .leg {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            color: var(--gray-400);
            font-weight: 500;
        }
        .leg-dot {
            width: 10px; height: 10px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        /* ─── Seat Grid ─── */
        .seat-grid {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 0 20px;
        }

        .seat-row {
            flex: 1;
            min-height: 38px;
            display: flex;
            align-items: stretch;
        }

        .row-num {
            width: 14px;
            font-size: 9px;
            font-weight: 500;
            color: var(--gray-300);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-right: 6px;
        }

        .seat-group {
            display: flex;
            gap: 5px;
            align-items: stretch;
        }

        .aisle-gap {
            width: 16px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .aisle-gap::after {
            content: '';
            width: 1px;
            height: 50%;
            background: var(--gray-200);
            border-radius: 1px;
        }

        /* ─── Seat ─── */
        .seat {
            flex: 1;
            min-width: 0;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: none;
            background: var(--gray-100);
            transition: transform 0.1s;
            cursor: default;
            padding: 5px 2px;
            overflow: hidden;
            position: relative;
            gap: 5px;
        }
        .seat:active { transform: scale(0.6); }

        .s-num {
            font-size: 11px;
            font-weight: 600;
            line-height: 1;
            color: var(--gray-300);
        }
        .s-name {
            font-size: clamp(10px, 2.8vw, 13px);
            font-weight: 700;
            text-align: center;
            line-height: 1.3;
            word-break: keep-all;
            color: #fff;
            letter-spacing: -0.3px;
        }
        .s-sub {
            font-size: 9px;
            font-weight: 600;
        }

        /* ─── Seat States ─── */

        .s-front {
            background: var(--gray-100);
        }
        .s-front .s-num { color: var(--gray-300); }
        .s-front .s-sub { color: var(--gray-300); }

        .s-empty {
            background: var(--gray-100);
        }
        .s-empty .s-num { color: var(--gray-300); }

        .s-back {
            background: var(--amber-lt);
            box-shadow: inset 3px 0 0 var(--amber);
        }
        .s-back .s-num { color: var(--amber); }

        .s-on {
            background: var(--primary);
            box-shadow: 0 2px 8px rgba(49,130,246,0.30);
        }
        .s-on .s-num { color: rgba(255,255,255,0.6); }

        .s-back-on {
            background: var(--amber);
            box-shadow: 0 2px 8px rgba(245,166,35,0.35);
        }
        .s-back-on .s-num  { color: rgba(255,255,255,0.6); }
        .s-back-on .s-name { color: #fff; }

        .s-pinned {
            background: var(--green);
            box-shadow: 0 2px 8px rgba(18,184,134,0.30);
        }
        .s-pinned .s-num  { color: rgba(255,255,255,0.6); }
        .s-pinned .s-name { color: #fff; }
        .s-pinned .s-sub  { color: rgba(255,255,255,0.7); font-size: 8px; }

        /* ─── Controls ─── */
        .controls {
            flex-shrink: 0;
            padding: 10px 20px 28px;
            border-top: 1px solid var(--gray-100);
            background: #fff;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn-row { display: flex; gap: 8px; }

        .btn {
            flex: 1;
            height: 52px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: 1.5px solid var(--primary);
            background: #fff;
            color: var(--primary);
            font-family: inherit;
            letter-spacing: -0.2px;
            transition: background 0.12s, color 0.12s, border-color 0.12s, transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }

        .btn-primary:active { background: var(--primary);  color: #fff; border-color: var(--primary); }
        .btn-reset:active   { background: var(--red);      color: #fff; border-color: var(--red);     }
        .btn-people:active  { background: var(--primary);  color: #fff; border-color: var(--primary); }
        .btn-pin            { border-color: var(--primary); color: var(--primary); }
        .btn-pin:active     { background: var(--green);    color: #fff; border-color: var(--green);   }

        /* ─── Bottom Sheet ─── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 200;
            align-items: flex-end;
        }
        .overlay.open { display: flex; }

        .sheet {
            background: #fff;
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            border-radius: 24px 24px 0 0;
            padding: 12px 20px 36px;
            max-height: 78vh;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.22s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }

        .sheet-handle {
            width: 36px; height: 4px;
            background: var(--gray-200);
            border-radius: 2px;
            margin: 0 auto 16px;
        }
        .sheet-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .sheet-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--gray-800);
        }
        .sheet-close {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--gray-100);
            font-size: 14px;
            cursor: pointer;
            color: var(--gray-600);
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sheet-close:active { opacity: 0.7; }

        .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .name-input {
            flex: 1;
            height: 48px;
            padding: 0 16px;
            border: 1.5px solid var(--gray-200);
            border-radius: 14px;
            font-size: 15px;
            outline: none;
            font-family: inherit;
            color: var(--gray-800);
            background: #fff;
            transition: border-color 0.15s;
        }
        .name-input:focus { border-color: var(--primary); }
        .add-btn {
            height: 48px;
            padding: 0 20px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
            transition: background 0.12s;
        }
        .add-btn:active { background: var(--primary-dk); }

        .people-meta {
            font-size: 12px;
            color: var(--gray-400);
            margin-bottom: 10px;
            font-weight: 500;
        }
        .people-meta.warn { color: var(--red); }

        .people-list {
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .person-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 13px 16px;
            background: var(--gray-50);
            border-radius: 14px;
        }
        .person-n {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-800);
        }
        .del-btn {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: none;
            background: #FFE8EA;
            color: var(--red);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .del-btn:active { opacity: 0.7; }
        .empty-msg {
            text-align: center;
            color: var(--gray-300);
            font-size: 14px;
            padding: 32px;
        }

        /* ─── Toast ─── */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(6px);
            background: rgba(31,45,61,0.9);
            color: #fff;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.2s;
            z-index: 999;
            white-space: nowrap;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ─── Pin Sheet ─── */
        .pin-select {
            flex: 1;
            min-width: 0;
            height: 48px;
            padding: 0 12px;
            border: 1.5px solid var(--gray-200);
            border-radius: 14px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
            color: var(--gray-800);
            background: #fff;
            transition: border-color 0.15s;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
        }
        .pin-select:focus { border-color: var(--green); }

        .pin-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 13px 16px;
            background: var(--green-lt);
            border-radius: 14px;
        }
        .pin-info { display: flex; align-items: center; gap: 8px; }
        .pin-name { font-size: 14px; font-weight: 700; color: var(--green); }
        .pin-arrow { font-size: 12px; color: var(--gray-300); }
        .pin-seat { font-size: 13px; font-weight: 600; color: var(--gray-600); }

        .add-btn-green {
            height: 48px;
            padding: 0 16px;
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
            flex-shrink: 0;
            transition: opacity 0.12s;
        }
        .add-btn-green:active { opacity: 0.85; }

        /* ─── Date bar (이미지에 포함) ─── */
        .date-bar {
            display: none;
            align-items: center;
            justify-content: center;
            padding: 8px 16px 7px;
            background: var(--primary);
            margin: 0 20px 8px;
            border-radius: 14px;
            flex-shrink: 0;
        }
        .date-bar.visible { display: flex; }
        .date-bar-text {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.2px;
        }

        .date-input {
            flex: 1;
            height: 48px;
            padding: 0 16px;
            border: 1.5px solid var(--gray-200);
            border-radius: 14px;
            font-size: 15px;
            outline: none;
            font-family: inherit;
            color: var(--gray-800);
            transition: border-color 0.15s;
        }
        .date-input:focus { border-color: var(--primary); }

        /* ─── Pop animation ─── */
        @keyframes pop {
            0%   { transform: scale(0.7); opacity: 0.3; }
            65%  { transform: scale(1.06); }
            100% { transform: scale(1); opacity: 1; }
        }
        .seat.pop { animation: pop 0.28s ease forwards; }
    </style>
</head>
<body>
<div class="app">

    <!-- Header -->
    <div class="header">
        <div class="header-spacer"></div>
        <div class="header-text">
            <h1>랜덤 좌석 배정</h1>
            <p>두근두근 내 옆자리는 누굴까</p>
        </div>
        <button class="btn-save-icon" onclick="saveImg()" title="이미지 저장">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
        </button>
    </div>

    <!-- Bus Seat Map -->
    <div class="bus-area" id="capture-area">
        <div class="date-bar" id="date-bar">
            <div class="date-bar-text" id="date-bar-text"></div>
        </div>
        <div class="legend">
            <div class="leg">
                <div class="leg-dot" style="background:var(--gray-100);"></div>
                빈 좌석
            </div>
            <div class="leg">
                <div class="leg-dot" style="background:var(--primary);"></div>
                배정됨
            </div>
            <div class="leg">
                <div class="leg-dot" style="background:var(--amber-lt);box-shadow:inset 3px 0 0 var(--amber);"></div>
                맨 뒷줄
            </div>
            <div class="leg">
                <div class="leg-dot" style="background:var(--green);"></div>
                고정됨
            </div>
        </div>

        <div class="seat-grid" id="seat-grid"></div>

    </div>

    <!-- Controls -->
    <div class="controls">
        <div class="btn-row">
            <button class="btn btn-primary" onclick="randomAssign()">랜덤 배정</button>
            <button class="btn btn-reset"   onclick="resetAll()">초기화</button>
        </div>
        <div class="btn-row">
            <button class="btn btn-pin"    onclick="openPinSheet()">자리 고정</button>
            <button class="btn btn-people" onclick="openSheet()">인원 관리</button>
        </div>
    </div>
</div>

<!-- Date Sheet -->
<div class="overlay" id="date-overlay" onclick="dateOverlayClick(event)">
    <div class="sheet" style="max-height:auto">
        <div class="sheet-handle"></div>
        <div class="sheet-head">
            <div class="sheet-title">날짜 설정 후 저장</div>
            <button class="sheet-close" onclick="closeDateSheet()">✕</button>
        </div>
        <div class="input-row">
            <input class="date-input" id="date-input" type="date">
        </div>
        <div class="btn-row" style="margin-top:4px">
            <button class="btn btn-primary" onclick="confirmSave()">저장하기</button>
        </div>
    </div>
</div>

<!-- Pin Sheet -->
<div class="overlay" id="pin-overlay" onclick="pinOverlayClick(event)">
    <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-head">
            <div class="sheet-title">자리 고정</div>
            <button class="sheet-close" onclick="closePinSheet()">✕</button>
        </div>
        <div class="input-row" style="align-items:stretch">
            <select class="pin-select" id="pin-person-select"></select>
            <select class="pin-select" id="pin-seat-select"></select>
            <button class="add-btn-green" onclick="addPin()">고정</button>
        </div>
        <div class="people-meta" id="pin-meta" style="margin-top:6px"></div>
        <div class="people-list" id="pin-list"></div>
    </div>
</div>

<!-- People Sheet -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
    <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-head">
            <div class="sheet-title">인원 관리</div>
            <button class="sheet-close" onclick="closeSheet()">✕</button>
        </div>
        <div class="input-row">
            <input class="name-input" id="name-input" type="text"
                   placeholder="이름 입력 (최대 6자)" maxlength="6"
                   onkeydown="if(event.key==='Enter')addPerson()">
            <button class="add-btn" onclick="addPerson()">추가</button>
        </div>
        <div class="people-meta" id="people-meta"></div>
        <div class="people-list" id="people-list"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LAYOUT = [
    { r:1,  L:[1,2],   R:[3,4],      type:'front'  },
    { r:2,  L:[5,6],   R:[7,8],      type:'front'  },
    { r:3,  L:[9,10],  R:[11,12],    type:'normal' },
    { r:4,  L:[13,14], R:[15,16],    type:'normal' },
    { r:5,  L:[17,18], R:[19,20],    type:'normal' },
    { r:6,  L:[21,22], R:[23,24],    type:'normal' },
    { r:7,  L:[25,26], R:[27,28],    type:'normal' },
    { r:8,  L:[29,30], R:[31,32],    type:'normal' },
    { r:9,  L:[33,34], R:[35,36],    type:'normal' },
    { r:10, L:[37,38], R:[39,40],    type:'normal' },
    { r:11, L:[41,42], R:[43,44,45], type:'back'   },
];

let people = [
    '김민준','이서연','박지호','최수아','정현우','강민서','조예은','윤도현',
    '장하은','임준혁','한지아','오승민','서예린','신태양','홍다은','문성진',
    '배나연','류지성','안소희','전민재','황하늘','남지현','노건우','석수빈',
    '마준서','하은지','변성호','경나은','유민호','표지수','곽준영','편소율'
];

let assignments = {};
let pinned = {};

/* ─── Grid ─── */
function buildGrid() {
    const grid = document.getElementById('seat-grid');
    grid.innerHTML = '';
    LAYOUT.forEach(row => {
        const rowEl = document.createElement('div');
        rowEl.className = 'seat-row';

        const rn = document.createElement('div');
        rn.className = 'row-num';
        rn.textContent = row.r;
        rowEl.appendChild(rn);

        // 왼쪽 그룹: flex = 좌석수 → 오른쪽과 비례 배분 → 모든 좌석 동일 너비
        const lg = document.createElement('div');
        lg.className = 'seat-group';
        lg.style.flex = row.L.length;
        row.L.forEach(n => lg.appendChild(makeSeat(n, row.type)));
        rowEl.appendChild(lg);

        const ag = document.createElement('div');
        ag.className = 'aisle-gap';
        rowEl.appendChild(ag);

        const rg = document.createElement('div');
        rg.className = 'seat-group';
        rg.style.flex = row.R.length;
        row.R.forEach(n => rg.appendChild(makeSeat(n, row.type)));
        rowEl.appendChild(rg);

        grid.appendChild(rowEl);
    });
}

function makeSeat(num, type) {
    const el = document.createElement('div');
    el.id = 's' + num;
    renderSeat(el, num, type);
    return el;
}

function renderSeat(el, num, type) {
    el.className = 'seat';
    el.innerHTML = '';

    const numEl = document.createElement('div');
    numEl.className = 's-num';
    numEl.textContent = num;
    el.appendChild(numEl);

    const isPinned = !!pinned[num];
    const name = isPinned ? pinned[num] : assignments[num];

    if (type === 'front') {
        el.classList.add('s-front');
        const sub = document.createElement('div');
        sub.className = 's-sub';
        sub.style.color = 'var(--gray-300)';
        sub.textContent = '비움';
        el.appendChild(sub);
    } else if (name) {
        if (isPinned) {
            el.classList.add('s-pinned');
        } else {
            el.classList.add(type === 'back' ? 's-back-on' : 's-on');
        }
        const nm = document.createElement('div');
        nm.className = 's-name';
        nm.textContent = name;
        el.appendChild(nm);
        if (isPinned) {
            const sub = document.createElement('div');
            sub.className = 's-sub';
            sub.textContent = '고정';
            el.appendChild(sub);
        }
    } else {
        el.classList.add(type === 'back' ? 's-back' : 's-empty');
    }
}

/* ─── Random assign ─── */
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function randomAssign() {
    if (!people.length) { showToast('인원을 먼저 등록해주세요'); return; }

    const pinnedSeats  = new Set(Object.keys(pinned).map(Number));
    const pinnedPeople = new Set(Object.values(pinned));

    const normal = [], back = [];
    LAYOUT.forEach(row => {
        const seats = [...row.L, ...row.R];
        if      (row.type === 'normal') normal.push(...seats.filter(s => !pinnedSeats.has(s)));
        else if (row.type === 'back')   back.push(...seats.filter(s => !pinnedSeats.has(s)));
    });

    const remaining = people.filter(p => !pinnedPeople.has(p));
    const sp = shuffle(remaining);
    const sn = shuffle(normal);
    const sb = shuffle(back);

    assignments = {};
    let i = 0;
    sn.forEach(s => { if (i < sp.length) assignments[s] = sp[i++]; });
    sb.forEach(s => { if (i < sp.length) assignments[s] = sp[i++]; });

    buildGrid();
    updateStats();

    Object.keys(assignments).forEach((s, idx) => {
        const el = document.getElementById('s' + s);
        if (!el) return;
        setTimeout(() => {
            el.classList.add('pop');
            el.addEventListener('animationend', () => el.classList.remove('pop'), { once: true });
        }, idx * 15);
    });

    showToast('좌석 배정이 완료되었습니다');
}

function resetAll() {
    assignments = {};
    pinned = {};
    buildGrid();
    updateStats();
    showToast('초기화 되었습니다');
}

/* ─── Stats ─── */
function updateStats() {}

/* ─── Sheet ─── */
function openSheet() {
    document.getElementById('overlay').classList.add('open');
    renderPeople();
    setTimeout(() => document.getElementById('name-input').focus(), 280);
}
function closeSheet() { document.getElementById('overlay').classList.remove('open'); }
function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeSheet(); }

function renderPeople() {
    const list = document.getElementById('people-list');
    const meta = document.getElementById('people-meta');
    const n = people.length;

    meta.textContent = `${n}명 등록됨`;
    meta.className = 'people-meta' + (n > 32 ? ' warn' : '');
    if (n > 32) meta.textContent += ' — 뒷줄 좌석이 사용됩니다';

    if (!n) { list.innerHTML = '<div class="empty-msg">등록된 인원이 없습니다</div>'; return; }

    list.innerHTML = people.map((name, i) => `
        <div class="person-item">
            <span class="person-n">${i + 1}. ${name}</span>
            <button class="del-btn" onclick="removePerson(${i})">✕</button>
        </div>
    `).join('');
}

function addPerson() {
    const input = document.getElementById('name-input');
    const name  = input.value.trim();
    if (!name) { showToast('이름을 입력하세요'); return; }
    if (people.includes(name)) { showToast('이미 등록된 이름입니다'); input.select(); return; }
    people.push(name);
    input.value = '';
    renderPeople();
    updateStats();
    showToast(`${name} 추가됨`);
}

function removePerson(idx) {
    const name = people[idx];
    people.splice(idx, 1);
    for (const seat in assignments) {
        if (assignments[seat] === name) delete assignments[seat];
    }
    for (const seat in pinned) {
        if (pinned[seat] === name) delete pinned[seat];
    }
    renderPeople();
    buildGrid();
    updateStats();
    showToast(`${name} 삭제됨`);
}

/* ─── Pin Sheet ─── */
function openPinSheet() {
    document.getElementById('pin-overlay').classList.add('open');
    renderPinSheet();
}
function closePinSheet() { document.getElementById('pin-overlay').classList.remove('open'); }
function pinOverlayClick(e) { if (e.target === document.getElementById('pin-overlay')) closePinSheet(); }

function renderPinSheet() {
    const pinnedPeople = new Set(Object.values(pinned));
    const pinnedSeats  = new Set(Object.keys(pinned).map(Number));

    // 사람 select
    const ps = document.getElementById('pin-person-select');
    const availPeople = people.filter(p => !pinnedPeople.has(p));
    ps.innerHTML = availPeople.length
        ? '<option value="">-- 사람 선택 --</option>' + availPeople.map(p => `<option value="${p}">${p}</option>`).join('')
        : '<option value="">배정 가능한 인원 없음</option>';

    // 자리 select
    const ss = document.getElementById('pin-seat-select');
    const availSeats = [];
    LAYOUT.forEach(row => {
        if (row.type === 'front') return;
        [...row.L, ...row.R].forEach(n => {
            if (!pinnedSeats.has(n)) availSeats.push({ n, type: row.type });
        });
    });
    ss.innerHTML = availSeats.length
        ? '<option value="">-- 자리 선택 --</option>' + availSeats.map(s => `<option value="${s.n}">${s.n}번${s.type === 'back' ? ' (뒷줄)' : ''}</option>`).join('')
        : '<option value="">남은 자리 없음</option>';

    // 메타
    const meta = document.getElementById('pin-meta');
    const cnt = Object.keys(pinned).length;
    meta.textContent = cnt ? `${cnt}개 고정됨` : '고정된 자리가 없습니다';

    // 목록
    const list = document.getElementById('pin-list');
    const entries = Object.entries(pinned);
    if (!entries.length) {
        list.innerHTML = '<div class="empty-msg">고정된 자리가 없습니다</div>';
        return;
    }
    list.innerHTML = entries.map(([seat, name]) => `
        <div class="pin-item">
            <div class="pin-info">
                <span class="pin-name">${name}</span>
                <span class="pin-arrow">→</span>
                <span class="pin-seat">${seat}번</span>
            </div>
            <button class="del-btn" onclick="removePin(${seat})">✕</button>
        </div>
    `).join('');
}

function addPin() {
    const name = document.getElementById('pin-person-select').value;
    const seat = parseInt(document.getElementById('pin-seat-select').value);
    if (!name) { showToast('사람을 선택해주세요'); return; }
    if (!seat) { showToast('자리를 선택해주세요'); return; }
    pinned[seat] = name;
    delete assignments[seat];
    buildGrid();
    updateStats();
    renderPinSheet();
    showToast(`${name} → ${seat}번 고정됨`);
}

function removePin(seat) {
    const name = pinned[seat];
    delete pinned[seat];
    buildGrid();
    updateStats();
    renderPinSheet();
    showToast(`${name} 고정 해제됨`);
}

/* ─── Date Sheet ─── */
function saveImg() {
    const input = document.getElementById('date-input');
    const today = new Date();
    input.value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    document.getElementById('date-overlay').classList.add('open');
}
function closeDateSheet() { document.getElementById('date-overlay').classList.remove('open'); }
function dateOverlayClick(e) { if (e.target === document.getElementById('date-overlay')) closeDateSheet(); }

async function confirmSave() {
    closeDateSheet();

    const val = document.getElementById('date-input').value;
    let dateLabel = '';
    if (val) {
        const [y, m, d] = val.split('-');
        const days = ['일','월','화','수','목','금','토'];
        const dow = days[new Date(val).getDay()];
        dateLabel = `${y}년 ${parseInt(m)}월 ${parseInt(d)}일 (${dow})`;
    }

    const bar = document.getElementById('date-bar');
    const barText = document.getElementById('date-bar-text');
    if (dateLabel) {
        barText.textContent = dateLabel;
        bar.classList.add('visible');
    }

    await new Promise(r => setTimeout(r, 60));

    showToast('이미지 생성 중...');
    try {
        const el     = document.getElementById('capture-area');
        const canvas = await html2canvas(el, {
            scale: 2.5, backgroundColor: '#ffffff', useCORS: true, logging: false,
        });
        const dataUrl = canvas.toDataURL('image/png');
        const isIOS   = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        if (isIOS) {
            const win = window.open('', '_blank');
            win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
                <meta name="viewport" content="width=device-width,initial-scale=1">
                <title>좌석 배정표</title></head>
                <body style="margin:0;background:#fff;text-align:center">
                <p style="padding:14px;font-size:14px;color:#666;font-weight:500">이미지를 길게 눌러 저장하세요</p>
                <img src="${dataUrl}" style="max-width:100%;display:block;margin:0 auto">
                </body></html>`);
            win.document.close();
            showToast('이미지를 길게 눌러 저장하세요');
        } else {
            const fn = val
                ? `좌석배정_${val.replace(/-/g,'')}.png`
                : `좌석배정_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.png`;
            const a = document.createElement('a');
            a.download = fn;
            a.href = dataUrl;
            a.click();
            showToast('이미지 저장 완료');
        }
    } catch(e) {
        showToast('저장에 실패했습니다');
        console.error(e);
    } finally {
        bar.classList.remove('visible');
    }
}

/* ─── Toast ─── */
let toastTimer;
function showToast(msg) {
    const el = document.getElementById('toast');
    clearTimeout(toastTimer);
    el.textContent = msg;
    el.classList.add('show');
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

buildGrid();
updateStats();
</script>
